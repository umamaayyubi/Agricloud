apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: agricloud
data:
  POSTGRES_DB: agricloud_db
  POSTGRES_USER: agricloud_user
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: agricloud
type: Opaque
stringData:
  POSTGRES_PASSWORD: "agricloud@12345"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: agricloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: agricloud
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
