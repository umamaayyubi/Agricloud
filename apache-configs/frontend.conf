<VirtualHost *:80>
    ServerAdmin admin@agricloud.com
    DocumentRoot /var/www/html/agricloud/frontend
    ServerName your-domain.com
    
    <Directory /var/www/html/agricloud/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy API requests to FastAPI backend
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    ErrorLog ${APACHE_LOG_DIR}/agricloud-error.log
    CustomLog ${APACHE_LOG_DIR}/agricloud-access.log combined
</VirtualHost>

